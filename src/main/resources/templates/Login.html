<!DOCTYPE html>
<html data-bs-theme="light" lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
    <title>Login</title>
    <link rel="stylesheet" href="../static/css/Login.css" th:href="@{css/Login.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap">
</head>

<body>
    <nav class="navbar navbar-expand-md sticky-top bg-white py-3">
        <div class="container"><a class="navbar-brand d-flex align-items-center" th:onclick="|window.location.href='@{/landingPage}'|"><span class="d-flex justify-content-center align-items-center me-3"><img src="/photos/Logo.jpg" alt="Logo" width="40" height="40" ></span><span class="fs-4"><strong>Gnosis</strong></span><span class="fs-4 text-primary"><strong>Academy</strong></span></a><button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navcol-1"><span class="visually-hidden">Toggle navigation</span><span class="navbar-toggler-icon"></span></button>
            <div class="collapse navbar-collapse" id="navcol-1">
                <ul class="navbar-nav mx-auto">
                    <li class="nav-item"></li>
                    <li class="nav-item"></li>
                    <li class="nav-item"></li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="container d-flex min-vh-100 justify-content-center align-items-center">
        <div class="card shadow p-4" style="width:100%;max-width:400px;">
            <h2 class="text-center mb-4">Login</h2>
            <form method="post" action="/login" th:action="@{/login}">
                <div class="mb-3"><label class="form-label" for="idNumber">ID Number</label><input class="form-control" type="text" id="idNumber" name="studentId" pattern="^[0-9]{4}-[0-9]{5}$" placeholder="0000-00000" required="" title="ID Number must be in the format 2024-58746">
                    <div class="invalid-feedback"><span>ID Number must be in the format 2024-58746</span></div>
                </div>
                <div class="mb-3"><label class="form-label" for="password">Password</label>
                    <div class="input-group"><input class="form-control" type="password" id="password" name="password" required=""><button class="btn btn-outline-secondary" id="togglePassword" type="button"><img id="confirmEyeIcon" alt="Toggle Password Visibility" height="20" src="/photos/visible.png" width="20"></button></div>
                </div>
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <div class="form-check mb-3"><input class="form-check-input" type="checkbox" id="rememberMe"><label class="form-check-label" for="rememberMe">Remember me</label></div><button class="btn btn-primary w-100" type="submit">Submit</button>
            </form>
            <div class="alert alert-success mt-3" role="alert" th:if="${loginInfo}" th:text="${loginInfo}"></div>
            <div class="alert alert-danger mt-3" role="alert" th:if="${loginError}" th:text="${loginError}"></div>
            <div class="text-center mt-4"><small class="text-muted">Don't have an account? </small><a class="fw-semibold text-decoration-none" href="/Student-registration" th:href="@{/Student-registration}">Register</a></div>
        </div>
    </div>
    <footer class="bg-light py-5">
        <div class="container">
            <div class="row">
                <div class="col text-center">
                    <p class="text-muted mb-0">© 2026 Gnosis Academy. All rights reserved.</p>
                </div>
            </div>
        </div>
    </footer><script>
        </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script defer src="/js/Loginscript.js?v=20260303" th:src="@{/js/Loginscript.js(v=20260303)}"></script>
</body>

</html>
