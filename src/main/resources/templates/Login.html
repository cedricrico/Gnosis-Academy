<!DOCTYPE html>
<html data-bs-theme="light" lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
    <title>Login</title>
    <link rel="stylesheet" href="/assets/bootstrap/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap">
    <link rel="stylesheet" href="/assets/css/Login.css">
</head>

<body>
    <nav class="navbar navbar-expand-md sticky-top bg-white py-3">
        <div class="container"><a class="navbar-brand d-flex align-items-center" href="/landingPage" th:href="@{/landingPage}"><span class="d-flex justify-content-center align-items-center me-3"><img src="/assets/img/Logo.jpg" alt="Logo" width="40" height="40"></span><span class="fs-4"><strong>Gnosis</strong></span><span class="fs-4 text-primary"><strong>Academy</strong></span></a><button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navcol-1"><span class="visually-hidden">Toggle navigation</span><span class="navbar-toggler-icon"></span></button>
            <div class="collapse navbar-collapse" id="navcol-1">
                <ul class="navbar-nav mx-auto">
                    <li class="nav-item"></li>
                    <li class="nav-item"></li>
                    <li class="nav-item"></li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="container d-flex min-vh-100 justify-content-center align-items-center">
        <div class="card shadow p-4" style="width:100%;max-width:400px;">
            <h2 class="text-center mb-4">Login</h2>
            <form id="student-login-form" method="post" action="/login" th:action="@{/login}">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <div class="mb-3"><label class="form-label" for="studentId">Student ID</label><input class="form-control" type="text" id="studentId" name="studentId" pattern="[0-9]{4}-[0-9]{5}" required="" title="Student ID must be in the format 0000-00000">
                    <div class="invalid-feedback"><span>Student ID must be in the format 0000-00000</span></div>
                </div>
                <div class="mb-3"><label class="form-label" for="password">Password</label>
                    <div class="input-group"><input class="form-control" type="password" id="password" name="password" required=""><button class="btn btn-outline-secondary" id="togglePassword" type="button"><img id="confirmEyeIcon" alt="Toggle Password Visibility" height="20" src="/assets/img/visible.png" width="20"></button></div>
                </div>
                <div class="alert alert-success mt-3" role="alert" th:if="${loginInfo}" th:text="${loginInfo}"></div>
                <div class="alert alert-danger mt-3" role="alert" th:if="${loginError}" th:text="${loginError}"></div>
                <div class="form-check mb-3"><input class="form-check-input" type="checkbox" id="rememberMe"><label class="form-check-label" for="rememberMe">Remember me</label></div><button class="btn btn-primary w-100" type="submit">Submit</button>
            </form>
            <div class="text-center mt-4"><small class="text-muted">Don't have an account? </small><a class="fw-semibold text-decoration-none" href="/Student-registration" th:href="@{/Student-registration}">Register</a></div>
        </div>
    </div>
    <footer class="bg-light py-5">
        <div class="container">
            <div class="row">
                <div class="col text-center">
                    <p class="text-muted mb-0">© 2026 Gnosis Academy. All rights reserved.</p>
                </div>
            </div>
        </div>
    </footer>
    <script src="/assets/bootstrap/js/bootstrap.bundle.min.js"></script>
    <script src="/assets/js/Loginscript.js"></script>
</body>

</html>
