<!DOCTYPE html>
<html data-bs-theme="light" lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
    <title>Admin Login</title>
    <link rel="stylesheet" href="/assets/bootstrap/css/bootstrap.min.css">
    
    <link rel="stylesheet" href="/assets/css/Landingstyle.css">
    <link rel="stylesheet" href="/assets/css/admin-login.css">
    <link rel="stylesheet" href="/assets/css/Registerstyles.css">
    <link rel="stylesheet" href="/assets/css/cssRegisterstyles.css">
    <link rel="stylesheet" href="/assets/css/instructor-landingStyle.css">
    <link rel="stylesheet" href="/assets/css/Login.css">
</head>

<body>
    <nav class="navbar navbar-expand-md sticky-top bg-white py-3">
        <div class="container"><a class="navbar-brand d-flex align-items-center" href="/landingPage" th:href="@{/landingPage}"><span class="d-flex justify-content-center align-items-center me-3"><img src="/assets/img/Logo.jpg" alt="Logo" width="40" height="40"></span><span class="fs-4"><strong>Gnosis</strong></span><span class="fs-4 text-primary"><strong>Academy</strong></span></a><button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navcol-1"><span class="visually-hidden">Toggle navigation</span><span class="navbar-toggler-icon"></span></button>
            <div class="collapse navbar-collapse" id="navcol-1">
                <ul class="navbar-nav mx-auto">
                    <li class="nav-item"></li>
                    <li class="nav-item"></li>
                    <li class="nav-item"></li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="container d-flex min-vh-100 justify-content-center align-items-center">
        <div class="card shadow p-4" style="width:100%;max-width:400px;">
            <div class="d-flex justify-content-center align-items-center mb-4"><img class="me-2" src="/assets/img/Logo.jpg" alt="Gnosis Academy Logo" width="40" height="40">
                <h2 class="mb-0">Admin Login</h2>
            </div>
            <form id="adminLoginForm" method="post" action="/admin/login" th:action="@{/admin/login}">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <div class="mb-3"><label class="form-label" for="adminUsername">Admin Username</label><input class="form-control" type="text" id="adminUsername" name="username" required="">
                    <div class="invalid-feedback"><span>Please enter a valid username</span></div>
                </div>
                <div class="mb-3"><label class="form-label" for="adminPassword">Password</label>
                    <div class="input-group"><input class="form-control" type="password" id="adminPassword" name="password" required=""><button class="btn btn-outline-secondary" id="adminTogglePassword" type="button"><img id="adminEyeIcon" alt="Toggle Password Visibility" height="20" src="/assets/img/visible.png" width="20"></button></div>
                </div>
                <div class="alert alert-success mt-3" role="alert" th:if="${loginInfo}" th:text="${loginInfo}"></div>
                <div class="alert alert-danger mt-3" role="alert" th:if="${loginError}" th:text="${loginError}"></div>
                <div class="form-check mb-3"><input class="form-check-input" type="checkbox" id="adminRememberMe" name="remember-me" value="true"><label class="form-check-label" for="adminRememberMe">Remember me</label></div><button class="btn btn-primary w-100" type="submit">Login</button>
            </form>
        </div>
    </div>
    <footer class="bg-light py-5">
        <div class="container">
            <div class="row">
                <div class="col text-center">
                    <p class="text-muted mb-0">© 2026 Gnosis Academy. All rights reserved.</p>
                </div>
            </div>
        </div>
    </footer>
    <script src="/assets/bootstrap/js/bootstrap.bundle.min.js"></script>
    <script src="/assets/js/admin-loginscript.js"></script>
    <script src="/assets/js/global-swal.js"></script>
</body>

</html>
