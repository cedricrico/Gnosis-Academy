<!DOCTYPE html>
<html data-bs-theme="light" lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
    <title>Professor Login - Gnosis Academy</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap">
    <link rel="stylesheet" href="/css/Landingstyle.css" th:href="@{/css/Landingstyle.css}">
    <link rel="stylesheet" href="/css/Registerstyles.css" th:href="@{/css/Registerstyles.css}">
    <link rel="stylesheet" href="/css/cssRegisterstyles.css" th:href="@{/css/cssRegisterstyles.css}">
    <link rel="stylesheet" href="/css/Login.css" th:href="@{/css/Login.css}">
</head>

<body>
    <nav class="navbar navbar-expand-md sticky-top bg-white py-3">
        <div class="container"><a class="navbar-brand d-flex align-items-center" href="/Professor-landing" th:href="@{/Professor-landing}"><span class="d-flex justify-content-center align-items-center me-3"><img src="/photos/Logo.jpg" th:src="@{/photos/Logo.jpg}" alt="Logo" width="40" height="40"></span><span class="fs-4"><strong>Gnosis</strong></span><span class="fs-4 text-primary"><strong>Academy</strong></span></a><button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navcol-1"><span class="visually-hidden">Toggle navigation</span><span class="navbar-toggler-icon"></span></button>
            <div class="collapse navbar-collapse" id="navcol-1">
                <ul class="navbar-nav mx-auto">
                    <li class="nav-item"></li>
                    <li class="nav-item"></li>
                    <li class="nav-item"></li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="container d-flex min-vh-100 justify-content-center align-items-center">
        <div class="card shadow p-4" style="width:100%;max-width:400px;">
            <h2 class="text-center mb-4">Professor Login</h2>
            <form id="professor-login-form" method="post" action="/professor/login" th:action="@{/professor/login}">
                <div class="mb-3"><label class="form-label" for="professorId">Professor ID</label><input class="form-control" type="text" id="professorId" name="professorId" pattern="\d{4}-\d{5}" required="" title="Professor ID must be in the format 0000-00000">
                    <div class="invalid-feedback"><span>Professor ID must be in the format 0000-00000</span></div>
                </div>
                <div class="mb-3"><label class="form-label" for="professorPassword">Password</label>
                    <div class="input-group"><input class="form-control" type="password" id="professorPassword" name="password" required=""><button class="btn btn-outline-secondary" id="professorTogglePassword" type="button"><img id="professorEyeIcon" alt="Toggle Password Visibility" height="20" src="/photos/visible.png?v=20260303" th:src="@{/photos/visible.png(v=20260303)}" width="20"></button></div>
                </div>
                <div class="alert alert-success mt-3" role="alert" th:if="${professorLoginInfo}" th:text="${professorLoginInfo}"></div>
                <div class="alert alert-danger mt-3" role="alert" th:if="${professorLoginError}" th:text="${professorLoginError}"></div>
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <div class="form-check mb-3"><input class="form-check-input" type="checkbox" id="professorRememberMe"><label class="form-check-label" for="professorRememberMe">Remember me</label></div><button class="btn btn-primary w-100" type="submit">Login</button>
            </form>
            <div class="text-center mt-4"><small class="text-muted">No account yet? </small><a class="fw-semibold text-decoration-none" href="/Professor-registration" th:href="@{/Professor-registration}">Register Here</a></div>
        </div>
    </div>
    <footer class="bg-light py-5">
        <div class="container">
            <div class="row">
                <div class="col text-center">
                    <p class="text-muted mb-0">© 2026 Gnosis Academy. All rights reserved.</p>
                </div>
            </div>
        </div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script defer src="/js/loginprofessorscript.js?v=20260303" th:src="@{/js/loginprofessorscript.js(v=20260303)}"></script>
</body>

</html>
