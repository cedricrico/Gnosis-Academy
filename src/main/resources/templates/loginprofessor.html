<!DOCTYPE html>
<html data-bs-theme="light" lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
    <title>Professor Login - Gnosis Academy</title>
    <link rel="stylesheet" href="/assets/bootstrap/css/bootstrap.min.css">
    
    <link rel="stylesheet" href="/assets/css/Landingstyle.css">
    <link rel="stylesheet" href="/assets/css/Registerstyles.css">
    <link rel="stylesheet" href="/assets/css/cssRegisterstyles.css">
    <link rel="stylesheet" href="/assets/css/Login.css">
</head>

<body>
    <nav class="navbar navbar-expand-md sticky-top bg-white py-3">
        <div class="container"><a class="navbar-brand d-flex align-items-center" href="/Professor-landing" th:href="@{/Professor-landing}"><span class="d-flex justify-content-center align-items-center me-3"><img src="/assets/img/Logo.jpg" alt="Logo" width="40" height="40"></span><span class="fs-4"><strong>Gnosis</strong></span><span class="fs-4 text-primary"><strong>Academy</strong></span></a><button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navcol-1"><span class="visually-hidden">Toggle navigation</span><span class="navbar-toggler-icon"></span></button>
            <div class="collapse navbar-collapse" id="navcol-1">
                <ul class="navbar-nav mx-auto">
                    <li class="nav-item"></li>
                    <li class="nav-item"></li>
                    <li class="nav-item"></li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="container d-flex min-vh-100 justify-content-center align-items-center">
        <div class="card shadow p-4" style="width:100%;max-width:400px;">
            <h2 class="text-center mb-4">Professor Login</h2>
            <form id="professor-login-form" method="post" action="/professor/login" th:action="@{/professor/login}">
                <div class="mb-3"><label class="form-label" for="employeeId">Employee ID</label><input class="form-control" type="text" id="employeeId" name="employeeId" pattern="\d{4}-\d{5}" required="" title="Employee ID must be in the format 0000-00000" maxlength="10" inputmode="numeric">
                    <div class="invalid-feedback"><span>Employee ID must be in the format 0000-00000</span></div>
                </div>
                <div class="mb-3"><label class="form-label" for="professorPassword">Password</label>
                    <div class="input-group"><input class="form-control" type="password" id="professorPassword" name="password" required=""><button class="btn btn-outline-secondary" id="professorTogglePassword" type="button"><img id="professorEyeIcon" alt="Toggle Password Visibility" height="20" src="/assets/img/visible.png" width="20"></button></div>
                </div>
                <div class="alert alert-success mt-3" role="alert" th:if="${professorLoginInfo}" th:text="${professorLoginInfo}"></div>
                <div class="alert alert-danger mt-3" role="alert" th:if="${professorLoginError}" th:text="${professorLoginError}"></div>
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <div class="form-check mb-3"><input class="form-check-input" type="checkbox" id="professorRememberMe"><label class="form-check-label" for="professorRememberMe">Remember me</label></div><button class="btn btn-primary w-100" type="submit">Login</button>
            </form>
            <div class="text-center mt-4"><small class="text-muted">No account yet? </small><a class="fw-semibold text-decoration-none" href="/Professor-registration" th:href="@{/Professor-registration}">Register Here</a></div>
        </div>
    </div>
    <footer class="bg-light py-5">
        <div class="container">
            <div class="row">
                <div class="col text-center">
                    <p class="text-muted mb-0">© 2026 Gnosis Academy. All rights reserved.</p>
                </div>
            </div>
        </div>
    </footer>
    <script src="/assets/bootstrap/js/bootstrap.bundle.min.js"></script>
    <script src="/assets/js/loginprofessorscript.js"></script>
    <script src="/assets/js/global-swal.js"></script>
</body>

</html>
