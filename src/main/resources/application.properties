    spring.application.name=Gnosis

# Use MySQL by default so application data is persisted and reflected
# across restarts.
spring.profiles.active=mysql

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# Dev UX: always read latest templates/static assets.
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=file:src/main/resources/templates/
spring.thymeleaf.suffix=.html
spring.web.resources.chain.cache=false
spring.web.resources.cache.period=0
spring.web.resources.static-locations=file:src/main/resources/static/,classpath:/static/

# Upload limits
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Chat integration
app.chat.provider=ollama

# OpenAI chat integration
app.openai.api-key=${OPENAI_API_KEY:}
app.openai.responses-url=https://api.openai.com/v1/responses
app.openai.model=gpt-4.1-mini

# Ollama local chat integration
app.ollama.base-url=http://localhost:11434
app.ollama.chat-url=/api/chat
app.ollama.model=llama3.2
