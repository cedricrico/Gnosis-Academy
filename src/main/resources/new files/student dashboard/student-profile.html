                            </div>
                            <div class="card-body">
                                <form id="editProfileForm">
                                    <div class="mb-3"><label class="form-label" for="currentPassword">Current Password</label><input class="form-control" type="password" id="currentPassword" placeholder="Enter current password"></div>
                                    <div class="mb-3"><label class="form-label" for="newPassword">New Password</label><input class="form-control" type="password" id="newPassword" placeholder="Enter new password"></div>
                                    <div class="mb-4"><label class="form-label" for="confirmPassword">Confirm Password</label><input class="form-control" type="password" id="confirmPassword" placeholder="Confirm new password"></div>
