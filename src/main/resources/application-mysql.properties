spring.application.name=Gnosis

# MySQL profile. Fill these in (or set via environment variables).
# Example URL: jdbc:mysql://localhost:3306/gnosis?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.url=${MYSQL_URL:jdbc:mysql://localhost:3306/gnosis?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
# Initialize Spring Session tables (SPRING_SESSION, SPRING_SESSION_ATTRIBUTES) on startup.
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema-mysql.sql
spring.session.store-type=jdbc
spring.session.jdbc.initialize-schema=always
spring.session.jdbc.schema=classpath:org/springframework/session/jdbc/schema-mysql.sql
# Always persist session updates (LAST_ACCESS_TIME, EXPIRY_TIME, etc.) each request.
spring.session.jdbc.save-mode=always
# Flush changes immediately so you can see updates right away in MySQL Workbench.
spring.session.jdbc.flush-mode=immediate

# Dev UX: always read latest templates/static assets.
spring.thymeleaf.cache=false
spring.web.resources.chain.cache=false
spring.web.resources.cache.period=0
